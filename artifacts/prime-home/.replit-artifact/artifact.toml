kind = "web"
previewPath = "/"
title = "Prime Home LB"
version = "1.0.0"
id = "artifacts/prime-home"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20131

[services.development]
run = "pnpm --filter @workspace/prime-home run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/prime-home", "run", "build" ]
publicDir = "artifacts/prime-home/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20131"
BASE_PATH = "/"
