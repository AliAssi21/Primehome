openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Prime Home LB Ecommerce API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: products
    description: Product operations
  - name: categories
    description: Category operations
  - name: cart
    description: Shopping cart operations
  - name: orders
    description: Order operations
  - name: auth
    description: Authentication operations
  - name: wishlist
    description: Wishlist operations
  - name: admin
    description: Admin operations
  - name: coupons
    description: Coupon operations
  - name: settings
    description: Store settings
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── CATEGORIES ────────────────────────────────────────────────────────────
  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a category (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/{id}:
    get:
      operationId: getCategory
      tags: [categories]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    patch:
      operationId: updateCategory
      tags: [categories]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      operationId: deleteCategory
      tags: [categories]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── PRODUCTS ───────────────────────────────────────────────────────────────
  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List products with optional filters
      parameters:
        - name: categoryId
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
        - name: minPrice
          in: query
          schema:
            type: number
        - name: maxPrice
          in: query
          schema:
            type: number
        - name: sort
          in: query
          schema:
            type: string
            enum: [newest, popular, price_asc, price_desc]
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: featured
          in: query
          schema:
            type: boolean
        - name: onSale
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Paginated products
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductList"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a product (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product with details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    patch:
      operationId: updateProduct
      tags: [products]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /products/{id}/related:
    get:
      operationId: getRelatedProducts
      tags: [products]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Related products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /products/featured:
    get:
      operationId: getFeaturedProducts
      tags: [products]
      summary: Get featured and best-seller products
      responses:
        "200":
          description: Featured products
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeaturedProducts"

  /products/flash-sale:
    get:
      operationId: getFlashSaleProducts
      tags: [products]
      summary: Get flash sale products
      responses:
        "200":
          description: Flash sale products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  # ─── AUTH ────────────────────────────────────────────────────────────────────
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /auth/me/update:
    patch:
      operationId: updateMe
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /auth/admin/login:
    post:
      operationId: adminLogin
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Admin logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  # ─── CART ────────────────────────────────────────────────────────────────────
  /cart:
    get:
      operationId: getCart
      tags: [cart]
      summary: Get current cart
      responses:
        "200":
          description: Cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
    post:
      operationId: addToCart
      tags: [cart]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CartItemInput"
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
    delete:
      operationId: clearCart
      tags: [cart]
      responses:
        "204":
          description: Cart cleared

  /cart/{productId}:
    patch:
      operationId: updateCartItem
      tags: [cart]
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CartItemUpdate"
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
    delete:
      operationId: removeFromCart
      tags: [cart]
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"

  # ─── ORDERS ──────────────────────────────────────────────────────────────────
  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List orders (user's own or admin all)
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Orders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderList"
    post:
      operationId: createOrder
      tags: [orders]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Created order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}/status:
    patch:
      operationId: updateOrderStatus
      tags: [orders]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderStatusUpdate"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  # ─── WISHLIST ─────────────────────────────────────────────────────────────────
  /wishlist:
    get:
      operationId: getWishlist
      tags: [wishlist]
      responses:
        "200":
          description: Wishlist items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /wishlist/{productId}:
    post:
      operationId: addToWishlist
      tags: [wishlist]
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WishlistStatus"
    delete:
      operationId: removeFromWishlist
      tags: [wishlist]
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WishlistStatus"

  # ─── ADMIN DASHBOARD ──────────────────────────────────────────────────────────
  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Dashboard overview stats
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/stats/sales:
    get:
      operationId: getSalesChart
      tags: [admin]
      summary: Sales chart data (daily/monthly)
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [daily, monthly]
      responses:
        "200":
          description: Sales data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SalesDataPoint"

  /admin/customers:
    get:
      operationId: listCustomers
      tags: [admin]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Customers list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerList"

  /admin/customers/{id}:
    get:
      operationId: getCustomer
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
    patch:
      operationId: updateCustomer
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  # ─── COUPONS ──────────────────────────────────────────────────────────────────
  /coupons:
    get:
      operationId: listCoupons
      tags: [coupons]
      responses:
        "200":
          description: Coupons
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Coupon"
    post:
      operationId: createCoupon
      tags: [coupons]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CouponInput"
      responses:
        "201":
          description: Created coupon
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Coupon"

  /coupons/{id}:
    delete:
      operationId: deleteCoupon
      tags: [coupons]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /coupons/validate:
    post:
      operationId: validateCoupon
      tags: [coupons]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CouponValidateInput"
      responses:
        "200":
          description: Coupon validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CouponValidateResult"

  # ─── SETTINGS ─────────────────────────────────────────────────────────────────
  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      responses:
        "200":
          description: Store settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreSettings"
    patch:
      operationId: updateSettings
      tags: [settings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoreSettingsUpdate"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreSettings"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    # ─── CATEGORY ────────────────────────────────────────────────────────────
    Category:
      type: object
      required: [id, name, slug]
      properties:
        id: { type: integer }
        name: { type: string }
        slug: { type: string }
        description: { type: ["string", "null"] }
        imageUrl: { type: ["string", "null"] }
        productCount: { type: integer }
        createdAt: { type: string }

    CategoryInput:
      type: object
      required: [name, slug]
      properties:
        name: { type: string }
        slug: { type: string }
        description: { type: string }
        imageUrl: { type: string }

    CategoryUpdate:
      type: object
      properties:
        name: { type: string }
        slug: { type: string }
        description: { type: string }
        imageUrl: { type: string }

    # ─── PRODUCT ─────────────────────────────────────────────────────────────
    Product:
      type: object
      required: [id, name, slug, price, stock]
      properties:
        id: { type: integer }
        name: { type: string }
        slug: { type: string }
        description: { type: ["string", "null"] }
        price: { type: number }
        salePrice: { type: ["number", "null"] }
        stock: { type: integer }
        sku: { type: ["string", "null"] }
        categoryId: { type: ["integer", "null"] }
        categoryName: { type: ["string", "null"] }
        images: { type: array, items: { type: string } }
        featured: { type: boolean }
        bestSeller: { type: boolean }
        onSale: { type: boolean }
        visible: { type: boolean }
        salesCount: { type: integer }
        createdAt: { type: string }

    ProductInput:
      type: object
      required: [name, slug, price, stock]
      properties:
        name: { type: string }
        slug: { type: string }
        description: { type: string }
        price: { type: number }
        salePrice: { type: number }
        stock: { type: integer }
        sku: { type: string }
        categoryId: { type: integer }
        images: { type: array, items: { type: string } }
        featured: { type: boolean }
        bestSeller: { type: boolean }
        onSale: { type: boolean }
        visible: { type: boolean }

    ProductUpdate:
      type: object
      properties:
        name: { type: string }
        slug: { type: string }
        description: { type: string }
        price: { type: number }
        salePrice: { type: ["number", "null"] }
        stock: { type: integer }
        sku: { type: string }
        categoryId: { type: ["integer", "null"] }
        images: { type: array, items: { type: string } }
        featured: { type: boolean }
        bestSeller: { type: boolean }
        onSale: { type: boolean }
        visible: { type: boolean }

    ProductList:
      type: object
      required: [items, total, page, limit]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        total: { type: integer }
        page: { type: integer }
        limit: { type: integer }

    FeaturedProducts:
      type: object
      required: [featured, bestSellers]
      properties:
        featured:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        bestSellers:
          type: array
          items:
            $ref: "#/components/schemas/Product"

    # ─── AUTH ────────────────────────────────────────────────────────────────
    RegisterInput:
      type: object
      required: [name, email, password]
      properties:
        name: { type: string }
        email: { type: string }
        password: { type: string }
        phone: { type: string }

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email: { type: string }
        password: { type: string }

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token: { type: string }
        user:
          $ref: "#/components/schemas/User"

    User:
      type: object
      required: [id, name, email, role]
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string }
        phone: { type: ["string", "null"] }
        role: { type: string }
        banned: { type: boolean }
        createdAt: { type: string }

    UserUpdate:
      type: object
      properties:
        name: { type: string }
        phone: { type: string }

    # ─── CART ────────────────────────────────────────────────────────────────
    CartItem:
      type: object
      required: [productId, productName, price, quantity, imageUrl]
      properties:
        productId: { type: integer }
        productName: { type: string }
        price: { type: number }
        salePrice: { type: ["number", "null"] }
        quantity: { type: integer }
        imageUrl: { type: string }
        stock: { type: integer }

    Cart:
      type: object
      required: [items, subtotal, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CartItem"
        subtotal: { type: number }
        deliveryFee: { type: number }
        discount: { type: number }
        total: { type: number }
        couponCode: { type: ["string", "null"] }

    CartItemInput:
      type: object
      required: [productId, quantity]
      properties:
        productId: { type: integer }
        quantity: { type: integer }

    CartItemUpdate:
      type: object
      required: [quantity]
      properties:
        quantity: { type: integer }

    # ─── ORDER ────────────────────────────────────────────────────────────────
    OrderItem:
      type: object
      required: [productId, productName, price, quantity]
      properties:
        productId: { type: integer }
        productName: { type: string }
        productImageUrl: { type: ["string", "null"] }
        price: { type: number }
        quantity: { type: integer }
        subtotal: { type: number }

    Order:
      type: object
      required: [id, orderNumber, status, total, createdAt]
      properties:
        id: { type: integer }
        orderNumber: { type: string }
        status: { type: string }
        customerName: { type: string }
        customerEmail: { type: ["string", "null"] }
        customerPhone: { type: string }
        address: { type: string }
        city: { type: string }
        deliveryArea: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }
        subtotal: { type: number }
        deliveryFee: { type: number }
        discount: { type: number }
        total: { type: number }
        paymentMethod: { type: string }
        couponCode: { type: ["string", "null"] }
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        createdAt: { type: string }

    OrderList:
      type: object
      required: [items, total, page, limit]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        total: { type: integer }
        page: { type: integer }
        limit: { type: integer }

    OrderInput:
      type: object
      required: [customerName, customerPhone, address, city, paymentMethod, items]
      properties:
        customerName: { type: string }
        customerEmail: { type: string }
        customerPhone: { type: string }
        address: { type: string }
        city: { type: string }
        deliveryArea: { type: string }
        notes: { type: string }
        paymentMethod: { type: string }
        couponCode: { type: string }
        items:
          type: array
          items:
            $ref: "#/components/schemas/CartItemInput"

    OrderStatusUpdate:
      type: object
      required: [status]
      properties:
        status: { type: string }

    # ─── WISHLIST ─────────────────────────────────────────────────────────────
    WishlistStatus:
      type: object
      required: [inWishlist]
      properties:
        inWishlist: { type: boolean }

    # ─── ADMIN ────────────────────────────────────────────────────────────────
    AdminStats:
      type: object
      required: [totalRevenue, totalOrders, totalCustomers, totalProducts]
      properties:
        totalRevenue: { type: number }
        totalOrders: { type: integer }
        totalCustomers: { type: integer }
        totalProducts: { type: integer }
        pendingOrders: { type: integer }
        lowStockProducts: { type: integer }
        revenueToday: { type: number }
        ordersToday: { type: integer }
        topProducts:
          type: array
          items:
            $ref: "#/components/schemas/TopProduct"
        recentOrders:
          type: array
          items:
            $ref: "#/components/schemas/Order"

    TopProduct:
      type: object
      required: [productId, productName, salesCount, revenue]
      properties:
        productId: { type: integer }
        productName: { type: string }
        imageUrl: { type: ["string", "null"] }
        salesCount: { type: integer }
        revenue: { type: number }

    SalesDataPoint:
      type: object
      required: [label, revenue, orders]
      properties:
        label: { type: string }
        revenue: { type: number }
        orders: { type: integer }

    Customer:
      type: object
      required: [id, name, email, orderCount, totalSpent, createdAt]
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string }
        phone: { type: ["string", "null"] }
        orderCount: { type: integer }
        totalSpent: { type: number }
        banned: { type: boolean }
        createdAt: { type: string }

    CustomerList:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Customer"
        total: { type: integer }

    CustomerUpdate:
      type: object
      properties:
        banned: { type: boolean }

    # ─── COUPONS ─────────────────────────────────────────────────────────────
    Coupon:
      type: object
      required: [id, code, type, value, active]
      properties:
        id: { type: integer }
        code: { type: string }
        type: { type: string }
        value: { type: number }
        minOrderAmount: { type: ["number", "null"] }
        maxUses: { type: ["integer", "null"] }
        usedCount: { type: integer }
        expiresAt: { type: ["string", "null"] }
        active: { type: boolean }
        createdAt: { type: string }

    CouponInput:
      type: object
      required: [code, type, value]
      properties:
        code: { type: string }
        type: { type: string, enum: [percentage, fixed] }
        value: { type: number }
        minOrderAmount: { type: number }
        maxUses: { type: integer }
        expiresAt: { type: string }

    CouponValidateInput:
      type: object
      required: [code, orderAmount]
      properties:
        code: { type: string }
        orderAmount: { type: number }

    CouponValidateResult:
      type: object
      required: [valid, discount]
      properties:
        valid: { type: boolean }
        discount: { type: number }
        message: { type: ["string", "null"] }

    # ─── SETTINGS ─────────────────────────────────────────────────────────────
    StoreSettings:
      type: object
      properties:
        storeName: { type: string }
        logoUrl: { type: ["string", "null"] }
        whatsappNumber: { type: ["string", "null"] }
        instagramUrl: { type: ["string", "null"] }
        email: { type: ["string", "null"] }
        address: { type: ["string", "null"] }
        deliveryFee: { type: number }
        freeDeliveryThreshold: { type: ["number", "null"] }
        currency: { type: string }
        announcementText: { type: ["string", "null"] }
        announcementActive: { type: boolean }

    StoreSettingsUpdate:
      type: object
      properties:
        storeName: { type: string }
        logoUrl: { type: string }
        whatsappNumber: { type: string }
        instagramUrl: { type: string }
        email: { type: string }
        address: { type: string }
        deliveryFee: { type: number }
        freeDeliveryThreshold: { type: number }
        currency: { type: string }
        announcementText: { type: string }
        announcementActive: { type: boolean }
